<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Herald{{end}}</title>
    <link rel="stylesheet" href="/static/pico.min.css?v={{assetVersion}}">
    <link rel="stylesheet" href="/static/herald.css?v={{assetVersion}}">
    <script>
        (function() {
            var t = localStorage.getItem('herald-theme');
            if (t) document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>
    <header class="top-nav">
        <div style="display:flex;flex-direction:column;gap:0;">
            <h1 style="margin-bottom:0;"><a href="/" style="text-decoration:none;color:inherit;">Herald</a></h1>
            <span style="font-size:0.6rem;opacity:0.4;line-height:1;margin-top:0.15rem;">{{buildVersion}} · {{buildTime}}</span>
        </div>
        {{block "nav" .}}{{end}}
        <form class="nav-search" onsubmit="return false;">
            <input type="search" name="q" placeholder="Search..."
                   hx-get="/search" hx-target="#article-list" hx-swap="innerHTML"
                   hx-trigger="input changed delay:300ms, search"
                   autocomplete="off">
        </form>
        <button id="theme-toggle" class="theme-toggle outline" aria-label="Toggle theme">☀</button>
    </header>
    {{block "content" .}}{{end}}
    <script src="/static/htmx.min.js?v={{assetVersion}}"></script>
    <script src="/static/herald.js?v={{assetVersion}}"></script>
</body>
</html>
